name: Daily Stock Analysis

on:
  schedule:
    # Run at 4:00 PM IST (10:30 AM UTC) — after NSE market close at 3:30 PM IST
    - cron: "30 10 * * 1-5"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run stock analysis
        run: bun run start
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

      - name: Commit results
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add public/ data/feedback/
          git diff --staged --quiet || git commit -m "chore: daily stock data $(date +%Y-%m-%d)"
          git push
