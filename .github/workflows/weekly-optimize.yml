name: Weekly Optimization

on:
  schedule:
    # Run every Saturday at 6:00 AM IST (12:30 AM UTC)
    - cron: "30 0 * * 6"
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run learning loop
        run: bun src/index.ts learn

      - name: Commit optimized config
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/config/ data/feedback/ public/
          git diff --staged --quiet || git commit -m "chore: weekly optimization $(date +%Y-%m-%d)"
          git push
